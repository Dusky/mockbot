<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mockbot — Monitor</title>
<style>
  :root{
    --bg:#0f172a; --panel:#1e293b; --panel-2:#172033; --inset:#0b1220;
    --border:#334155; --border-soft:#26324a;
    --text:#f1f5f9; --muted:#94a3b8; --dim:#64748b;
    --indigo:#818cf8; --indigo-deep:#6366f1; --sky:#38bdf8; --teal:#5eead4;
    --ok:#22c55e; --warn:#f59e0b; --err:#ef4444;
    --mono:ui-monospace,SFMono-Regular,"JetBrains Mono",Menlo,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 80% -10%, rgba(99,102,241,.10), transparent 60%),var(--bg);color:var(--text);font-family:var(--sans);font-size:14px}
  [x-cloak]{display:none!important}
  .topbar{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:10px 18px;background:rgba(15,23,42,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
  .brand{display:flex;align-items:center;gap:12px;font-weight:700;letter-spacing:.3px}
  .brand .logo{font-size:1.15rem}
  .brand .ver{color:var(--dim);font:600 .7rem var(--mono)}
  .pill{display:inline-flex;align-items:center;gap:7px;padding:4px 10px;border-radius:999px;background:var(--panel);border:1px solid var(--border);font:600 .78rem var(--sans)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--err);transition:background .3s}
  .dot.ok{background:var(--ok);box-shadow:0 0 0 3px rgba(34,197,94,.18)}
  .dot.warn{background:var(--warn)}
  .dot.off{background:var(--dim)}
  .topmeta{display:flex;align-items:center;gap:14px;color:var(--muted);font-size:.82rem}
  .topmeta b{color:var(--text);font-weight:600}
  .topmeta a{color:var(--dim);text-decoration:none}
  .topmeta a:hover{color:var(--text)}
  .shell{display:grid;grid-template-columns:208px 1fr;min-height:calc(100vh - 49px)}
  .side{border-right:1px solid var(--border);padding:18px 12px;display:flex;flex-direction:column;gap:4px}
  .nav{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:var(--muted);text-decoration:none;font-weight:600}
  .nav:hover{background:var(--panel-2);color:var(--text)}
  .nav.active{background:linear-gradient(90deg,rgba(99,102,241,.22),rgba(99,102,241,.05));color:#fff;border:1px solid var(--border-soft)}
  .nav.soon{opacity:.5;pointer-events:none}
  .nav .tag{margin-left:auto;font:600 .62rem var(--mono);color:var(--dim);border:1px solid var(--border);padding:1px 6px;border-radius:6px}
  .side .spacer{flex:1}
  .main{padding:20px 22px;display:flex;flex-direction:column;gap:18px;min-width:0}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .stat{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
  .stat .k{color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.6px}
  .stat .v{font:700 1.5rem var(--sans);margin-top:6px}
  .stat .v .u{font-size:.85rem;color:var(--dim);font-weight:600}
  .stat.tts .v{color:var(--teal)}
  .grid{display:grid;grid-template-columns:1.25fr 1fr;gap:16px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;overflow:hidden}
  .card h2{margin:0;padding:12px 16px;font-size:.82rem;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);border-bottom:1px solid var(--border-soft);display:flex;align-items:center;gap:8px}
  .card h2 .count{margin-left:auto;font:600 .72rem var(--mono);color:var(--dim)}
  .card .body{padding:6px 8px;overflow:auto;max-height:300px}
  .empty{color:var(--dim);padding:18px;text-align:center;font-size:.85rem}
  .chan{display:grid;grid-template-columns:14px 1fr auto;align-items:center;gap:10px;padding:9px 10px;border-radius:8px}
  .chan:hover{background:var(--panel-2)}
  .chan .name{font:600 .92rem var(--mono);color:var(--text)}
  .badges{display:flex;gap:6px;align-items:center}
  .badge{font:700 .64rem var(--sans);padding:2px 7px;border-radius:6px;text-transform:uppercase;letter-spacing:.4px}
  .b-gen{background:#312e81;color:var(--indigo)}
  .b-ind{background:#3f1d38;color:#f0abfc}
  .b-on{background:#064e3b;color:#5eead4}
  .b-off{background:#3a1414;color:#fca5a5}
  .b-meta{background:var(--inset);color:var(--muted);font-family:var(--mono);text-transform:none}
  .tts{padding:10px 12px;border-left:3px solid var(--indigo-deep);background:var(--panel-2);border-radius:8px;margin:6px 4px}
  .tts .h{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
  .tts .who{font-weight:700}
  .tts .when{color:var(--dim);font:600 .72rem var(--mono)}
  .tts .txt{color:#e2e8f0;line-height:1.35}
  .tts .tags{margin-top:6px;display:flex;gap:6px}
  .line{padding:5px 10px;border-radius:6px;font-size:.9rem;line-height:1.4}
  .line:hover{background:var(--panel-2)}
  .line .ch{font:600 .7rem var(--mono);color:var(--dim);margin-right:6px}
  .line .u{font-weight:700;color:var(--sky)}
  .line.bot .u{color:var(--indigo)}
  .log{font-family:var(--mono);font-size:.78rem;padding:4px 10px;display:flex;gap:10px;border-radius:6px}
  .log .t{color:var(--dim)}
  .log .lv{font-weight:700;min-width:46px}
  .log.info .lv{color:var(--sky)} .log.warn .lv{color:var(--warn)} .log.err .lv{color:var(--err)}
  .log .m{color:var(--muted)}
  @media(max-width:900px){.shell{grid-template-columns:1fr}.side{flex-direction:row;overflow:auto}.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body x-data="dashboard" x-cloak>
  <div class="topbar">
    <div class="brand"><span class="logo">🤖</span> mockbot <span class="ver">monitor</span>
      <span class="pill" style="margin-left:10px"><span class="dot" :class="connClass()"></span> <span x-text="conn"></span></span>
    </div>
    <div class="topmeta">
      <span>as <b x-text="status.nick"></b></span>
      <span>up <b x-text="fmtUptime(status.uptime)"></b></span>
      <span class="pill"><span class="dot" :class="status.tts_enabled?'ok':'off'"></span> TTS&nbsp;<b x-text="status.tts_enabled?'ON':'OFF'"></b></span>
      <span>pid <b x-text="status.pid ?? '—'"></b></span>
      <a href="/auth/logout">log out ⎋</a>
    </div>
  </div>

  <div class="shell">
    <aside class="side">
      <a class="nav active" href="/monitor">📡 Monitor</a>
      <a class="nav" href="/sources">🎙️ TTS Sources</a>
      <a class="nav" href="/settings">⚙️ Settings</a>
      <a class="nav" href="/commands">💬 Commands</a>
      <div class="spacer"></div>
      <a class="nav" href="/auth/logout" style="color:var(--dim)">⎋ Log out</a>
    </aside>

    <main class="main">
      <div class="stats">
        <div class="stat"><div class="k">Channels</div><div class="v"><span x-text="status.channels.length"></span> <span class="u">/ <span x-text="status.joined_count"></span> joined</span></div></div>
        <div class="stat"><div class="k">Uptime</div><div class="v" x-text="fmtUptime(status.uptime)"></div></div>
        <div class="stat tts"><div class="k">TTS engine</div><div class="v" x-text="status.tts_enabled?'ON':'OFF'"></div></div>
        <div class="stat"><div class="k">Reconnects</div><div class="v"><span x-text="attempts"></span> <span class="u">session</span></div></div>
      </div>

      <div class="grid">
        <section class="card">
          <h2>Channels <span class="count" x-text="status.joined_count + ' joined'"></span></h2>
          <div class="body">
            <template x-for="c in status.channels" :key="c.channel">
              <div class="chan">
                <span class="dot" :class="dotClass(c)"></span>
                <span class="name" x-text="'#' + c.channel"></span>
                <span class="badges">
                  <span class="badge" :class="c.general?'b-gen':'b-ind'" x-text="c.general?'Gen':'Indiv'"></span>
                  <span class="badge" :class="c.tts?'b-on':'b-off'">TTS</span>
                  <span class="badge b-meta" x-text="c.tts ? (fmtPct(c.chance) + '·' + c.delay + 's') : 'off'"></span>
                </span>
              </div>
            </template>
            <div class="empty" x-show="status.channels.length===0">No channels.</div>
          </div>
        </section>

        <section class="card">
          <h2>TTS Activity <span class="count">live</span></h2>
          <div class="body">
            <template x-for="(t,i) in tts" :key="i">
              <div class="tts">
                <div class="h"><span class="who" x-text="t.author || t.channel"></span><span class="when" x-text="fmtTime(t._t)"></span></div>
                <div class="txt" x-text="t.text"></div>
                <div class="tags">
                  <template x-if="t.provider"><span class="badge b-meta" x-text="t.provider"></span></template>
                  <template x-if="t.voice"><span class="badge b-on" x-text="t.voice"></span></template>
                </div>
              </div>
            </template>
            <div class="empty" x-show="tts.length===0">Waiting for TTS…</div>
          </div>
        </section>

        <section class="card">
          <h2>Live Chat <span class="count" x-text="chat.length + ' recent'"></span></h2>
          <div class="body">
            <template x-for="(m,i) in chat" :key="i">
              <div class="line" :class="m.is_bot?'bot':''">
                <span class="ch" x-text="'#' + m.channel"></span>
                <span class="u" :style="m.color ? ('color:'+m.color) : ''" x-text="m.author"></span>: <span x-text="m.text"></span>
              </div>
            </template>
            <div class="empty" x-show="chat.length===0">No chat yet…</div>
          </div>
        </section>

        <section class="card">
          <h2>Event Log</h2>
          <div class="body">
            <template x-for="(e,i) in log" :key="i">
              <div class="log" :class="logClass(e.lv)">
                <span class="t" x-text="fmtClock(e.t)"></span>
                <span class="lv" x-text="e.lv"></span>
                <span class="m" x-text="e.msg"></span>
              </div>
            </template>
            <div class="empty" x-show="log.length===0">No events yet…</div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script defer src="/static/dashboard.js"></script>
  <script defer src="/static/vendor/alpine.min.js"></script>
</body>
</html>
