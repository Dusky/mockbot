[auth]
; Get these from https://dev.twitch.tv/console
tmi_token = oauth:your_oauth_token_here
client_id = your_client_id_here
nickname = YourBotNameHere
owner = YourTwitchUsername
; SECURITY: Set a strong admin password for web interface access
; Default: admin123 (CHANGE THIS FOR PRODUCTION!)
; NOTE: After initial setup, run migration to create user accounts:
; python utils/migrate_to_users.py --db ansv_bot.db
admin_password = admin123

[oauth]
; Web dashboard login — needs YOUR OWN Twitch application, NOT a token generator.
; (twitchtokengenerator etc. won't work here: their redirect URLs aren't yours,
; so Twitch will bounce the login back to them.) Create an app at
; https://dev.twitch.tv/console and register its Redirect URL to match
; twitch_redirect_uri below EXACTLY. On a VPS use your public https domain,
; e.g. https://bot.example.com/auth/twitch/callback
twitch_client_id = your_oauth_client_id_here
twitch_client_secret = your_oauth_client_secret_here
twitch_redirect_uri = http://localhost:5001/auth/twitch/callback

[settings]
; Prefix for bot commands
command_prefix = !  
; Channels to auto-join (comma-separated) - DEPRECATED (Stored in database instead)
channels = 
; Enable debug mode for verbose logging (true/false)
debug_mode = false

[web]
; Web dashboard (FastAPI). See docs/webui.md for the VPS reverse-proxy setup.
port = 5001
; Bind address. Behind a reverse proxy (recommended) keep this 127.0.0.1.
; To expose uvicorn directly, use 0.0.0.0 (then you must terminate TLS yourself).
host = 127.0.0.1
; REQUIRED on a server: a long random string. Generate with:
;   python -c "import secrets; print(secrets.token_urlsafe(48))"
secret_key = your-secret-key-here
; Set true when the dashboard is served over HTTPS (marks session cookies Secure).
secure_cookies = false
; Trust X-Forwarded-* from your reverse proxy (its IP, or 127.0.0.1 if same host).
forwarded_allow_ips = 127.0.0.1
verbose_logs = false

[tts]
; TTS settings (optional)
enable_tts = false
voice_preset = v2/en_speaker_6 
